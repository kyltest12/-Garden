services:
  - type: web
    name: garden-game
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/status
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: GOOGLE_SHEET_ID
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: GOOGLE_SERVICE_ACCOUNT_EMAIL
        sync: false
      - key: GOOGLE_PRIVATE_KEY
        sync: false
